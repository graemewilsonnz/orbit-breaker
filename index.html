<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Orbit Breaker — a fast, original radial arcade shooter built for desktop."
    />
    <meta name="theme-color" content="#05070d" />
    <title>Orbit Breaker</title>
  </head>
  <body>
    <main class="game-shell">
      <section id="gameStage" class="game-stage" aria-label="Orbit Breaker radial arcade shooter">
        <canvas id="gameCanvas" width="960" height="720">
          Orbit Breaker requires a browser with HTML5 Canvas support.
        </canvas>
        <p id="appStatus" class="app-status" role="status" aria-live="polite">
          Loading Orbit Breaker…
        </p>

        <nav class="quick-controls" aria-label="Game display controls">
          <button
            id="muteButton"
            class="chrome-button"
            type="button"
            aria-pressed="false"
            title="Mute or restore all audio (M)"
          >
            SOUND ON
          </button>
          <button
            id="settingsButton"
            class="chrome-button"
            type="button"
            aria-haspopup="dialog"
            aria-controls="settingsPanel"
            aria-expanded="false"
            title="Open settings (S)"
          >
            SETTINGS
          </button>
        </nav>

        <section
          id="settingsPanel"
          class="settings-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="settingsTitle"
          hidden
        >
          <div class="settings-card">
            <header class="settings-header">
              <div>
                <p class="settings-kicker">ORBIT BREAKER // SYSTEM</p>
                <h2 id="settingsTitle">Settings</h2>
              </div>
              <button
                id="closeSettingsButton"
                class="icon-button"
                type="button"
                aria-label="Close settings"
              >
                ×
              </button>
            </header>

            <div class="settings-fields">
              <label class="slider-setting" for="masterVolume">
                <span>Master</span>
                <output id="masterVolumeValue" for="masterVolume">80%</output>
                <input id="masterVolume" type="range" min="0" max="100" step="1" value="80" />
              </label>
              <label class="slider-setting" for="musicVolume">
                <span>Adaptive pulse</span>
                <output id="musicVolumeValue" for="musicVolume">42%</output>
                <input id="musicVolume" type="range" min="0" max="100" step="1" value="42" />
              </label>
              <label class="slider-setting" for="effectsVolume">
                <span>Effects</span>
                <output id="effectsVolumeValue" for="effectsVolume">78%</output>
                <input id="effectsVolume" type="range" min="0" max="100" step="1" value="78" />
              </label>

              <label class="toggle-setting" for="muteToggle">
                <span>
                  <strong>Mute all audio</strong>
                  <small>Stored on this device</small>
                </span>
                <input id="muteToggle" type="checkbox" />
              </label>
              <label class="toggle-setting" for="reducedShakeToggle">
                <span>
                  <strong>Reduced shake</strong>
                  <small>Keeps impact cues with gentler camera motion</small>
                </span>
                <input id="reducedShakeToggle" type="checkbox" />
              </label>
            </div>

            <div class="settings-actions">
              <button id="fullscreenButton" class="action-button" type="button">
                ENTER FULLSCREEN
              </button>
              <button
                id="doneSettingsButton"
                class="action-button action-button-primary"
                type="button"
              >
                DONE
              </button>
            </div>
            <p class="settings-note">
              Gameplay is paused while settings are open. Press P or Escape after closing to resume.
            </p>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/app/bootstrap.ts"></script>
  </body>
</html>
